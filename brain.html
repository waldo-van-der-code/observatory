<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Your Taste Brain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1a0f;
    --zone-explored: #c8763a;
    --zone-dim: #1e2e3a;
    --zone-neighbor: #7ec8e3;
    --text: #f5e8c8;
    --text-muted: #8a9a7a;
    --panel-bg: #1a2a1a;
    --panel-border: #c8763a;
    --amber-dark: #8b4513;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Text', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    padding: 1.5rem 1rem 0.5rem;
  }
  header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.1rem, 3vw, 1.8rem);
    letter-spacing: 0.08em;
    color: var(--text);
    opacity: 0.92;
  }
  header .subtitle {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
    font-style: italic;
  }

  #axis-labels {
    position: relative;
    width: 100%;
    max-width: 820px;
    margin: 0 auto;
    height: 0;
  }
  .axis-label {
    position: absolute;
    font-size: 0.7rem;
    color: var(--text-muted);
    font-style: italic;
    letter-spacing: 0.05em;
  }
  .axis-x-left  { left: 0.5rem; top: 0.5rem; }
  .axis-x-right { right: 0.5rem; top: 0.5rem; }
  .axis-y-top    { left: 50%; transform: translateX(-50%); top: 0.5rem; }
  .axis-y-bottom { left: 50%; transform: translateX(-50%); bottom: 0.5rem; }

  #brain-container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 1.5rem;
    padding: 1rem 1rem 2rem;
    flex-wrap: wrap;
  }

  #brain-svg-wrap {
    position: relative;
    flex: 0 0 auto;
  }

  svg#brain {
    display: block;
    cursor: pointer;
  }

  .zone-cell {
    transition: opacity 0.2s;
  }
  .zone-cell:hover { opacity: 0.85; }

  .zone-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    fill: var(--text);
    pointer-events: none;
    text-anchor: middle;
    dominant-baseline: middle;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.9));
  }

  @keyframes pulse-glow {
    0%, 100% { stroke-opacity: 0.6; stroke-width: 2.5px; }
    50%       { stroke-opacity: 1;   stroke-width: 4px; }
  }

  .neighbor-highlight {
    animation: pulse-glow 2s ease-in-out infinite;
  }

  /* ── Detail panel ─────────────────────────────────── */
  #detail {
    flex: 0 0 300px;
    min-height: 400px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 1.2rem;
    display: none;
    position: relative;
    overflow: hidden;
  }
  #detail.visible { display: block; }

  #detail-art {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0.18;
    filter: sepia(0.4) hue-rotate(20deg) saturate(1.4) brightness(0.88) contrast(1.1);
    transition: opacity 0.8s;
    pointer-events: none;
    border-radius: 8px;
  }

  #detail-content {
    position: relative;
    z-index: 1;
  }

  #detail h2 {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--panel-border);
    margin-bottom: 0.4rem;
    line-height: 1.3;
  }

  .engagement-bar-wrap {
    margin: 0.6rem 0;
  }
  .engagement-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .engagement-bar {
    height: 6px;
    background: #2a3a2a;
    border-radius: 3px;
    overflow: hidden;
  }
  .engagement-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--amber-dark), var(--zone-explored));
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  .exemplars {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin: 0.5rem 0;
    font-style: italic;
  }

  .posters-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-top: 0.8rem;
  }
  .poster-card {
    aspect-ratio: 2/3;
    border-radius: 4px;
    overflow: hidden;
    background: #2a3a2a;
    position: relative;
  }
  .poster-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: sepia(0.4) hue-rotate(20deg) saturate(1.4) brightness(0.88) contrast(1.1);
    display: block;
  }
  .poster-card .poster-title {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4px;
    font-size: 0.6rem;
    font-family: 'Cinzel', serif;
    color: var(--text);
    background: rgba(15, 26, 15, 0.7);
    line-height: 1.2;
  }

  .neighbors-section {
    margin-top: 0.9rem;
    border-top: 1px solid #2a3a2a;
    padding-top: 0.7rem;
  }
  .neighbors-section h3 {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-bottom: 0.4rem;
    text-transform: uppercase;
  }
  .neighbor-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .neighbor-chip {
    background: #0f200f;
    border: 1px solid var(--zone-neighbor);
    color: var(--zone-neighbor);
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .neighbor-chip:hover { background: #1a3a3a; }

  .temporal-section {
    margin-top: 0.8rem;
  }
  .temporal-section h3 {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-bottom: 0.4rem;
    text-transform: uppercase;
  }
  .temporal-bars {
    display: flex;
    gap: 4px;
    align-items: flex-end;
    height: 40px;
  }
  .temporal-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    height: 100%;
  }
  .temporal-bar {
    width: 100%;
    background: var(--zone-explored);
    border-radius: 2px 2px 0 0;
    opacity: 0.7;
    min-height: 2px;
  }
  .temporal-bar-label {
    font-size: 0.55rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  #generate-art-btn {
    margin-top: 0.9rem;
    width: 100%;
    background: transparent;
    border: 1px solid var(--panel-border);
    color: var(--panel-border);
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.15s, color 0.15s;
  }
  #generate-art-btn:hover { background: var(--panel-border); color: var(--bg); }
  #generate-art-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,26,15,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #loading-overlay.visible { display: flex; }
  #loading-overlay span {
    font-family: 'Cinzel', serif;
    color: var(--text);
    font-size: 1.1rem;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<header>
  <h1>✦ Your Taste Brain · 2014–2026</h1>
  <p class="subtitle">12 years of Spotify · Netflix · IMDb · Goodreads</p>
</header>

<div id="loading-overlay"><span>Loading…</span></div>

<div id="brain-container">
  <div id="brain-svg-wrap">
    <div id="axis-labels">
      <span class="axis-label axis-x-left">Intimate ←</span>
      <span class="axis-label axis-x-right">→ Epic</span>
    </div>
    <svg id="brain"></svg>
  </div>

  <div id="detail">
    <div id="detail-art"></div>
    <div id="detail-content">
      <h2 id="detail-title"></h2>
      <div class="engagement-bar-wrap">
        <div class="engagement-bar-label">
          <span id="detail-engagement-label">Exploration</span>
          <span id="detail-engagement-pct"></span>
        </div>
        <div class="engagement-bar"><div class="engagement-bar-fill" id="detail-bar"></div></div>
      </div>
      <p class="exemplars" id="detail-exemplars"></p>
      <div class="posters-grid" id="detail-posters"></div>
      <div class="temporal-section" id="detail-temporal"></div>
      <div class="neighbors-section">
        <h3>Unexplored nearby</h3>
        <div class="neighbor-chips" id="detail-neighbors"></div>
      </div>
      <button id="generate-art-btn">✦ Generate atmospheric art</button>
    </div>
  </div>
</div>

<script>
const W = Math.min(window.innerWidth * 0.95, 820);
const H = W * 0.72;
const PAD = 28;

let zonesData = [];
let maxEngagement = 1;
let selectedZone = null;

const svg = d3.select('#brain')
  .attr('width', W)
  .attr('height', H);

// Defs for glow filter
const defs = svg.append('defs');
const glow = defs.append('filter').attr('id', 'glow').attr('x', '-50%').attr('y', '-50%').attr('width', '200%').attr('height', '200%');
glow.append('feGaussianBlur').attr('stdDeviation', '4').attr('result', 'blur');
const feMerge = glow.append('feMerge');
feMerge.append('feMergeNode').attr('in', 'blur');
feMerge.append('feMergeNode').attr('in', 'SourceGraphic');

const glowStrong = defs.append('filter').attr('id', 'glow-strong').attr('x', '-80%').attr('y', '-80%').attr('width', '260%').attr('height', '260%');
glowStrong.append('feGaussianBlur').attr('stdDeviation', '8').attr('result', 'blur');
const feMerge2 = glowStrong.append('feMerge');
feMerge2.append('feMergeNode').attr('in', 'blur');
feMerge2.append('feMergeNode').attr('in', 'SourceGraphic');

// Background
svg.append('rect').attr('width', W).attr('height', H).attr('fill', '#0f1a0f');

// Subtle grid lines
const gridG = svg.append('g').attr('opacity', 0.06);
gridG.append('line').attr('x1', W/2).attr('y1', PAD).attr('x2', W/2).attr('y2', H - PAD).attr('stroke', '#f5e8c8').attr('stroke-dasharray', '4,4');
gridG.append('line').attr('x1', PAD).attr('y1', H/2).attr('x2', W - PAD).attr('y2', H/2).attr('stroke', '#f5e8c8').attr('stroke-dasharray', '4,4');

// Axis labels on SVG
svg.append('text').attr('x', PAD + 4).attr('y', H/2).attr('fill', '#8a9a7a').attr('font-size', 9).attr('font-style', 'italic').attr('transform', `rotate(-90, ${PAD+4}, ${H/2})`).attr('text-anchor', 'middle').text('Visceral ← → Intellectual');

const zonesG = svg.append('g');
const labelsG = svg.append('g');

function scaleX(x) { return PAD + (x / 100) * (W - 2 * PAD); }
function scaleY(y) { return PAD + ((100 - y) / 100) * (H - 2 * PAD); }

function engagementColor(zone) {
  const t = zone.engagement.total / maxEngagement;
  return d3.interpolateRgb('#1e2e3a', '#c8763a')(Math.pow(t, 0.5));
}

function renderBrain(zones) {
  zonesData = zones;
  maxEngagement = d3.max(zones, d => d.engagement.total) || 1;

  const points = zones.map(z => [scaleX(z.x), scaleY(z.y)]);
  const voronoi = d3.Delaunay.from(points).voronoi([0, 0, W, H]);

  zonesG.selectAll('*').remove();
  labelsG.selectAll('*').remove();

  zones.forEach((zone, i) => {
    const cell = voronoi.renderCell(i);
    const cx = scaleX(zone.x);
    const cy = scaleY(zone.y);
    const t = zone.engagement.total / maxEngagement;
    const glowRadius = 2 + t * 10;

    const g = zonesG.append('g').attr('class', 'zone-cell').attr('data-id', zone.id);

    // Main fill
    g.append('path')
      .attr('d', cell)
      .attr('fill', engagementColor(zone))
      .attr('fill-opacity', 0.55 + t * 0.3)
      .attr('stroke', '#0f1a0f')
      .attr('stroke-width', 2)
      .attr('filter', t > 0.3 ? 'url(#glow)' : null)
      .attr('class', 'zone-path')
      .on('click', () => selectZone(zone));

    // Engagement dot
    g.append('circle')
      .attr('cx', cx).attr('cy', cy)
      .attr('r', 3 + t * 5)
      .attr('fill', '#f5e8c8')
      .attr('opacity', 0.35)
      .attr('pointer-events', 'none');

    // Label
    labelsG.append('text')
      .attr('class', 'zone-label')
      .attr('x', cx).attr('y', cy)
      .text(zone.label.split(' & ')[0].split(',')[0]);
  });
}

function highlightNeighbors(zone) {
  zonesG.selectAll('.zone-path').each(function() {
    const id = this.parentNode.dataset.id;
    if (zone.neighbors.includes(id)) {
      d3.select(this)
        .attr('stroke', '#7ec8e3')
        .attr('stroke-width', 3)
        .attr('class', 'zone-path neighbor-highlight');
    } else {
      d3.select(this)
        .attr('stroke', '#0f1a0f')
        .attr('stroke-width', 2)
        .attr('class', 'zone-path');
    }
  });
}

async function selectZone(zone) {
  selectedZone = zone;
  highlightNeighbors(zone);
  showDetail(zone);
  await loadPosters(zone);
}

function showDetail(zone) {
  const panel = document.getElementById('detail');
  panel.classList.add('visible');

  document.getElementById('detail-title').textContent = `✦ ${zone.label}`;

  const pct = Math.round(zone.engagement.total / maxEngagement * 100);
  document.getElementById('detail-engagement-pct').textContent = `${pct}%`;
  document.getElementById('detail-bar').style.width = `${pct}%`;

  const breakdown = [];
  if (zone.engagement.music > 0) breakdown.push(`${Math.round(zone.engagement.music)}h music`);
  if (zone.engagement.film > 0)  breakdown.push(`${Math.round(zone.engagement.film)} film`);
  if (zone.engagement.book > 0)  breakdown.push(`${zone.engagement.book.toFixed(1)} book`);
  document.getElementById('detail-engagement-label').textContent = breakdown.join(' · ') || 'Engagement';

  document.getElementById('detail-exemplars').textContent = zone.exemplars.join(' · ');

  // Temporal bars
  const temporal = zone.temporal || {};
  const tempKeys = Object.keys(temporal).sort();
  const tempSection = document.getElementById('detail-temporal');
  if (tempKeys.length > 0) {
    const maxT = Math.max(...Object.values(temporal));
    tempSection.innerHTML = `
      <h3>Over time</h3>
      <div class="temporal-bars">
        ${tempKeys.map(k => `
          <div class="temporal-bar-wrap">
            <div style="flex:1; display:flex; align-items:flex-end; width:100%">
              <div class="temporal-bar" style="height:${Math.max(4, (temporal[k]/maxT)*36)}px"></div>
            </div>
            <span class="temporal-bar-label">${k.replace('-', '–')}</span>
          </div>
        `).join('')}
      </div>`;
  } else {
    tempSection.innerHTML = '';
  }

  // Neighbors
  const nChips = document.getElementById('detail-neighbors');
  nChips.innerHTML = zone.neighbors.map(nid => {
    const nzone = zonesData.find(z => z.id === nid);
    return `<span class="neighbor-chip" data-id="${nid}">${nzone ? nzone.label.split(' & ')[0].split(',')[0] : nid}</span>`;
  }).join('');
  nChips.querySelectorAll('.neighbor-chip').forEach(el => {
    el.addEventListener('click', () => {
      const nzone = zonesData.find(z => z.id === el.dataset.id);
      if (nzone) selectZone(nzone);
    });
  });

  // Poster placeholders
  document.getElementById('detail-posters').innerHTML =
    zone.top_items.slice(0, 8).map(item =>
      `<div class="poster-card" data-src="${item.source}" data-srcid="${item.source_id || ''}" data-title="${item.title}">
        <span class="poster-title">${item.title}</span>
      </div>`
    ).join('');

  // Art button
  const artBtn = document.getElementById('generate-art-btn');
  if (zone.art_cached) {
    document.getElementById('detail-art').style.backgroundImage = `url('/brain/art/${zone.id}')`;
    document.getElementById('detail-art').style.opacity = '0.22';
    artBtn.textContent = '✦ Regenerate art';
  } else {
    document.getElementById('detail-art').style.backgroundImage = '';
    document.getElementById('detail-art').style.opacity = '0.18';
    artBtn.textContent = '✦ Generate atmospheric art';
  }
  artBtn.disabled = false;
  artBtn.onclick = () => generateArt(zone);
}

async function loadPosters(zone) {
  const posters = document.getElementById('detail-posters');
  try {
    const res = await fetch(`/api/brain/zone/${zone.id}/posters`);
    if (!res.ok) return;
    const items = await res.json();
    items.forEach((item, i) => {
      const card = posters.children[i];
      if (!card || !item.poster_url) return;
      card.innerHTML = `<img src="${item.poster_url}" alt="${item.title}" loading="lazy"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <span class="poster-title" style="display:none">${item.title}</span>`;
    });
  } catch (e) {
    console.warn('Poster fetch failed:', e);
  }
}

async function generateArt(zone) {
  const btn = document.getElementById('generate-art-btn');
  btn.disabled = true;
  btn.textContent = '✦ Conjuring…';
  try {
    const res = await fetch(`/api/brain/zone/${zone.id}/art`, { method: 'POST' });
    const data = await res.json();
    if (data.art_url) {
      const art = document.getElementById('detail-art');
      art.style.backgroundImage = `url('${data.art_url}?t=${Date.now()}')`;
      art.style.opacity = '0.22';
      zone.art_cached = true;
      btn.textContent = '✦ Regenerate art';
    } else {
      btn.textContent = '✦ No image key configured';
    }
  } catch (e) {
    btn.textContent = '✦ Failed — retry?';
  }
  btn.disabled = false;
}

// Bootstrap
async function init() {
  document.getElementById('loading-overlay').classList.add('visible');
  try {
    const res = await fetch('/api/brain/zones');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const zones = await res.json();
    renderBrain(zones);
  } catch (e) {
    document.getElementById('loading-overlay').querySelector('span').textContent =
      'Failed to load — is the server running?';
    return;
  }
  document.getElementById('loading-overlay').classList.remove('visible');
}

init();
</script>
</body>
</html>
