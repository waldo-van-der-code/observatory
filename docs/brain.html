<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body {
    background: #2c3a28;
    min-height: 100vh;
    display: flex; justify-content: center; align-items: flex-start;
    padding: 0.8rem;
    font-family: 'Crimson Text', serif;
  }
  #map-view { display: flex; justify-content: center; }
  #map-outer {
    overflow: hidden; cursor: grab; flex: 0 0 auto; position: relative;
    box-shadow: 0 8px 48px rgba(0,0,0,0.65), 0 0 0 1px rgba(0,0,0,0.4);
    border-radius: 2px;
  }
  #map-outer:active { cursor: grabbing; }
  #map-wrap { position: relative; transform-origin: 0 0; }

  /* The atlas image IS the map */
  #atlas-img {
    display: block;
    /* Starting state set by updateBasemapLOD() — see JS */
  }
  #atlas-wash {
    position: absolute; inset: 0;
    background: rgba(232,218,184,1);
    pointer-events: none;
    /* opacity controlled by updateBasemapLOD() */
  }

  /* Label tier transitions for zoom-reveal */
  .lbl-t2 { transition: opacity 0.25s; }
  .lbl-t3 { transition: opacity 0.25s; }

  /* SVG label layer sits on top of the image */
  #map-svg {
    position: absolute; inset: 0;
    overflow: visible; pointer-events: none;
  }
  /* Static overlay never zooms */
  #map-overlay {
    position: absolute; inset: 0;
    pointer-events: none; overflow: visible;
  }

  /* All labels always visible — tiny at overview, readable on zoom (like a real map) */

  .zone-name {
    font-family: 'Cinzel', serif; font-weight: 700;
    text-anchor: middle; dominant-baseline: middle;
    paint-order: stroke fill; pointer-events: none;
  }
  .zone-sub {
    font-family: 'Crimson Text', serif; font-style: italic;
    text-anchor: middle; dominant-baseline: middle;
    paint-order: stroke fill; pointer-events: none;
  }
  .zone-item {
    dominant-baseline: middle; paint-order: stroke fill;
    pointer-events: all; cursor: pointer;
  }
  .zone-item:hover { opacity: 1 !important; }
  .zone-hotspot { fill: transparent; cursor: pointer; pointer-events: all; }

  #loading-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(40,55,35,0.6); z-index: 100;
    align-items: center; justify-content: center;
  }
  #loading-overlay.visible { display: flex; }
  #loading-overlay span {
    font-family: 'Cinzel', serif; color: #e8dfc0;
    font-size: 1.1rem; letter-spacing: .1em;
  }
</style>
</head>

  </div>
</div>

<script>
// ── Dimensions — match the atlas image aspect ratio ────────────────────────
// Image is 3:2 landscape. Fit to viewport.
const W = Math.min(window.innerWidth * 0.99, 1440);
const H = Math.round(W * 2 / 3);   // 3:2 ratio

let zonesData=[], maxEngagement=1, currentZoom=1;
let zonePolygons={}, zoomBehavior;
let atlasLandMask=null;   // Uint8Array(MW*MH) — 1=land, 0=ocean
let MW=0, MH=0;            // integer mask dimensions (canvas must use integers)

// ── Zone accent colors (text + stroke on the atlas image) ──────────────────
const ZONE_ACCENT = {
  SOUL_JAZZ:       '#7a3a08',
  FOLK_SINGER:     '#1a4808',
  ELECTRONIC_HIP:  '#0c1c58',
  INDIE_WORLD:     '#380a60',
  ROCK:            '#5a0808',  // deep red — electric rock energy
  DRAMA:           '#580808',
  CRIME_THRILLER:  '#0a3030',
  ARTHOUSE:        '#343808',
  SCI_FI:          '#0c1848',
  FANTASY_COMEDY:  '#483a04',
  ACTION_ADV:      '#581604',
  ANIMATION:       '#083a20',
  HISTORY:         '#2c1c04',
};

function clamp(a,v,b){return Math.max(a,Math.min(b,v));}
function scaleX(x){return(x/100)*W;}
function scaleY(y){return((100-y)/100)*H;}
function mulberry32(seed){
  return function(){
    let t=seed+=0x6D2B79F5;
    t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);
    return((t^t>>>14)>>>0)/4294967296;
  };
}

function polygonWidthAt(poly,y){
  let minX=Infinity,maxX=-Infinity;
  for(let i=0;i<poly.length-1;i++){
    const[x0,y0]=poly[i],[x1,y1]=poly[i+1];
    if((y0<=y&&y1>y)||(y1<=y&&y0>y)){
      const t=(y-y0)/(y1-y0),x=x0+t*(x1-x0);
      minX=Math.min(minX,x);maxX=Math.max(maxX,x);
    }
  }
  return maxX>minX?maxX-minX:0;
}

// ── Voronoi — used for label placement regions ─────────────────────────────
function buildVoronoi(zones){
  const pts=zones.map(z=>[scaleX(z.x),scaleY(z.y)]);
  const delaunay=d3.Delaunay.from(pts);
  const voronoi=delaunay.voronoi([0,0,W,H]);
  zones.forEach((z,i)=>{const p=voronoi.cellPolygon(i);if(p)zonePolygons[z.id]=p;});
}

function mulberry32(seed){
  return function(){
    let t=seed+=0x6D2B79F5;
    t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);
    return((t^t>>>14)>>>0)/4294967296;
  };
}
function hashCode(s){let h=0;for(let i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;return Math.abs(h);}

// ── Basemap LOD — heavy mute at overview, reveals on zoom ────────────────
function updateBasemapLOD(k){
  // t=0 at overview (k≤1.2), t=1 fully zoomed in (k≥3.0)
  const t=Math.max(0,Math.min(1,(k-1.2)/1.8));
  // Subtle muting at overview — enough to let labels lead without draining the image
  const sat =(0.55+t*0.22).toFixed(3);   // 0.55 → 0.77
  const con =(0.74+t*0.14).toFixed(3);   // 0.74 → 0.88
  const bri =(1.06-t*0.04).toFixed(3);   // 1.06 → 1.02
  d3.select('#atlas-img')
    .style('filter',`saturate(${sat}) contrast(${con}) brightness(${bri})`);
  // Very light parchment hint — just enough to warm, not enough to bleach
  d3.select('#atlas-wash').style('opacity',(0.08*(1-t)+0.02*t).toFixed(3));
}

// ── Zoom-level label reveal ───────────────────────────────────────────────
function updateLabelTiers(k){
  d3.selectAll('.lbl-t2').style('opacity', k>=1.5 ? null : 0);
  d3.selectAll('.lbl-t3').style('opacity', k>=3.0 ? null : 0);
  d3.selectAll('.city-marker.lbl-t2').style('opacity', k>=1.5 ? null : 0);
  d3.selectAll('.city-marker.lbl-t3').style('opacity', k>=3.0 ? null : 0);
  // Borders: subtle but present at overview, a bit more on zoom
  d3.selectAll('.zone-border').style('opacity',
    k>=3.0 ? 0.35 : k>=1.8 ? 0.22 : 0.14);
}

// ── Per-zone overview label budget (visual balance) ───────────────────────
const OVERVIEW_BUDGET = {
  SOUL_JAZZ:9, FOLK_SINGER:9, INDIE_WORLD:7, ROCK:7,
  DRAMA:6, HISTORY:5, CRIME_THRILLER:5, ELECTRONIC_HIP:6,
  FANTASY_COMEDY:5, ANIMATION:5, SCI_FI:5, ACTION_ADV:4,
  ARTHOUSE:6,
};

// ── Safe-frame clamping for zone names ────────────────────────────────────
function clampLabelToSafeFrame(x, y, w, h){
  const pad=38;
  // also avoid ranking panels
  const lPanelRight=16+160+10, rPanelLeft=W-16-160-10;
  const xSafe=[
    Math.max(pad+w/2, Math.min(W-pad-w/2, x))
  ];
  // nudge away from panels if in their vertical range (y < 24+116+10)
  let cx=xSafe[0];
  if(y<165){ cx=Math.max(lPanelRight+w/2, Math.min(rPanelLeft-w/2, cx)); }
  const cy=Math.max(pad+h/2, Math.min(H-pad-h/2, y));
  return [cx, cy];
}

// ── Atlas land mask — built from image pixels, constrains label placement ─
// Ocean pixel detection: significantly more blue than red+green average.
// Threshold tuned for the muted blue-grey ocean in the ChatGPT atlas image.
function buildAtlasLandMask(){
  const img=document.getElementById('atlas-img');
  if(!img.complete||!img.naturalWidth){ console.log('[atlas-mask] image not ready'); return; }
  // Must use integer dimensions for canvas/getImageData to work correctly
  MW=Math.round(W); MH=Math.round(H);
  const off=document.createElement('canvas');
  off.width=MW; off.height=MH;
  const ctx=off.getContext('2d',{willReadFrequently:true});
  ctx.drawImage(img,0,0,MW,MH);
  const d=ctx.getImageData(0,0,MW,MH).data;
  // Sample known-ocean pixel to verify detection
  const si=(50*MW+200)*4;
  console.log('[atlas-mask] ocean sample(200,50): r='+d[si]+' g='+d[si+1]+' b='+d[si+2]);
  atlasLandMask=new Uint8Array(MW*MH);
  let landCount=0;
  for(let i=0;i<MW*MH;i++){
    const r=d[i*4],g=d[i*4+1],b=d[i*4+2];
    // Ocean: blue is notably higher than red/green; handles muted atlas ocean colors
    const isOcean=(b-(r+g)/2)>18 && b>70 && r<175;
    if(!isOcean) landCount++;
    atlasLandMask[i]=isOcean?0:1;
  }
  console.log('[atlas-mask] land='+landCount+'/'+MW*MH+'='+(landCount/MW/MH*100).toFixed(1)+'%');
}

// Check if a label bounding box is fully on land (no ocean pixels underneath)
function isAtlasLand(x,y,tw,th){
  if(!atlasLandMask||!MW) return true;  // mask not ready → allow all (fallback)
  const pad=3;
  const pts=[
    [x,y],
    [x-tw/3,y-th/3],[x+tw/3,y-th/3],
    [x-tw/3,y+th/3],[x+tw/3,y+th/3],
    [x,y-th/2-pad],[x,y+th/2+pad],
    [x-tw/2-pad,y],[x+tw/2+pad,y],
  ];
  return pts.every(([px,py])=>{
    const xi=Math.max(0,Math.min(MW-1,Math.round(px)));
    const yi=Math.max(0,Math.min(MH-1,Math.round(py)));
    return atlasLandMask[yi*MW+xi]===1;
  });
}

// ── Zone borders — faint country lines over the atlas image ───────────────
function renderZoneBorders(svg, zones) {
  zones.forEach(zone => {
    const poly = zonePolygons[zone.id];
    if (!poly) return;
    svg.append('path')
      .attr('d', 'M'+poly.map(p=>p.join(',')).join('L')+'Z')
      .attr('fill', 'none')
      .attr('class', 'zone-border')
      .attr('stroke', 'rgba(80,55,18,1)')  // ink color — opacity controlled in updateLabelTiers
      .attr('stroke-width', 0.9)
      .attr('stroke-dasharray', '4,6')
      .attr('pointer-events', 'none');
  });
}

// ── Sub-zone shading — province-like highlight for sub-genre areas ─────────
// Each zone with a sub-label gets a subtle lighter ellipse region (clipped
// to its Voronoi polygon) suggesting a "district" or province within the territory.
function renderSubdivisions(svg, zones) {
  const defs = svg.append('defs');

  zones.forEach(zone => {
    const poly = zonePolygons[zone.id];
    if (!poly) return;

    const words = zone.label.split(/[,&]+/).map(s=>s.trim()).filter(Boolean);
    if (words.length < 2) return;  // no sub-genre, no subdivision

    const centroid = d3.polygonCentroid(poly);
    const area = Math.abs(d3.polygonArea(poly));
    const r = Math.sqrt(area / Math.PI);

    // Deterministic placement using zone ID seed
    const rng = mulberry32(hashCode(zone.id) ^ 0xABCD);
    const angle = rng() * Math.PI * 2;
    const dist  = r * (0.28 + rng() * 0.22);  // 28-50% of zone radius from centroid
    const subCx = centroid[0] + Math.cos(angle) * dist;
    const subCy = centroid[1] + Math.sin(angle) * dist;
    const rx    = r * (0.32 + rng() * 0.14);   // 32-46% of zone radius
    const ry    = rx * (0.65 + rng() * 0.25);  // slightly oval
    const tilt  = rng() * 50 - 25;

    // Clip path: constrain ellipse to Voronoi polygon
    const clipId = `sdclip-${zone.id}`;
    defs.append('clipPath').attr('id', clipId)
      .append('path')
      .attr('d', 'M'+poly.map(p=>p.join(',')).join('L')+'Z');

    // Sub-zone fill: very subtle lighter tint
    svg.append('ellipse')
      .attr('cx', subCx).attr('cy', subCy)
      .attr('rx', rx).attr('ry', ry)
      .attr('transform', `rotate(${tilt} ${subCx} ${subCy})`)
      .attr('clip-path', `url(#${clipId})`)
      .attr('fill', 'rgba(255,248,210,0.16)')
      .attr('pointer-events', 'none');

    // Sub-zone border: dashed golden line
    svg.append('ellipse')
      .attr('cx', subCx).attr('cy', subCy)
      .attr('rx', rx).attr('ry', ry)
      .attr('transform', `rotate(${tilt} ${subCx} ${subCy})`)
      .attr('clip-path', `url(#${clipId})`)
      .attr('fill', 'none')
      .attr('stroke', 'rgba(220,170,50,0.55)')
      .attr('stroke-width', 0.8)
      .attr('stroke-dasharray', '3,2')
      .attr('pointer-events', 'none');
  });
}

// ── SVG labels ─────────────────────────────────────────────────────────────
function renderLabels(zones){
  const svg=d3.select('#map-svg');
  svg.selectAll('*').remove();

  // ── Layer 0: parchment wash over entire basemap ──
  svg.append('rect')
    .attr('x',0).attr('y',0).attr('width',W).attr('height',H)
    .attr('fill','rgba(232,218,184,0.16)').attr('pointer-events','none');

  // ── Layer 1: borders and sub-zone highlights (under labels) ──
  renderZoneBorders(svg, zones);
  renderSubdivisions(svg, zones);

  // ── Layer 2: parchment fog behind each zone's label cluster ──
  const defs = svg.select('defs').empty() ? svg.append('defs') : svg.select('defs');
  zones.forEach(zone=>{
    const cx=scaleX(zone.x), cy=scaleY(zone.y);
    const engR=zone.engagement.total/maxEngagement;
    // INDIE gets a larger, stronger fog to compete with busy city terrain
    const isIndie=zone.id==='INDIE_WORLD';
    const r=W*(isIndie?0.10:(0.055+0.065*Math.sqrt(engR)));
    const grad=defs.append('radialGradient')
      .attr('id',`fog-${zone.id}`).attr('cx','50%').attr('cy','50%').attr('r','50%');
    grad.append('stop').attr('offset','0%')
      .attr('stop-color','#e8dab8').attr('stop-opacity',isIndie?0.28:0.20);
    grad.append('stop').attr('offset','100%')
      .attr('stop-color','#e8dab8').attr('stop-opacity',0);
    svg.append('ellipse')
      .attr('cx',cx).attr('cy',cy).attr('rx',r).attr('ry',r*0.78)
      .attr('fill',`url(#fog-${zone.id})`).attr('pointer-events','none');
  });

  // Pre-reserve panel areas (match renderOverlay() positions exactly)
  const R=[
    {x:W/2,y:10,w:W,h:22},{x:W/2,y:H-10,w:W,h:22},
    {x:10,y:H/2,w:22,h:H},{x:W-10,y:H/2,w:22,h:H},
    {x:93,y:82,w:160,h:120},{x:W-93,y:82,w:160,h:120},
    {x:W/2,y:H-20,w:404,h:48},{x:W-52,y:H-52,w:72,h:72},
    {x:78,y:H-53,w:128,h:78},
  ];

  zones.forEach(zone=>{
    const poly=zonePolygons[zone.id];
    if(!poly) return;
    // Start at layout seed; if on ocean, search outward for nearest land
    let cx=scaleX(zone.x), cy=scaleY(zone.y);
    if(atlasLandMask && !isAtlasLand(cx,cy,20,20)){
      outer: for(let sr=8;sr<120;sr+=8){
        for(let sa=0;sa<Math.PI*2;sa+=0.25){
          const tx=cx+Math.cos(sa)*sr, ty=cy+Math.sin(sa)*sr;
          if(d3.polygonContains(poly,[tx,ty]) && isAtlasLand(tx,ty,20,20)){
            cx=tx; cy=ty; break outer;
          }
        }
      }
    }
    const engR=zone.engagement.total/maxEngagement;
    const acc=ZONE_ACCENT[zone.id]||'#222';

    const words=zone.label.split(/[,&]+/).map(s=>s.trim()).filter(Boolean);
    const main=words[0].toUpperCase(), sub=words.slice(1).join(' & ');
    const pw=polygonWidthAt(poly,cy);
    const charW=main.length*0.56;
    const fzByW=pw>0?(pw*0.54)/charW:80;
    const fzByE=Math.sqrt(engR)*88;
    const nameFz=clamp(13,Math.min(fzByW,fzByE),88);
    const nameH=nameFz*(sub?1.6:1.2);
    // Clamp to safe frame — prevents FOLK, INDIE, SOUL from touching edge/panels
    const [scx,scy]=clampLabelToSafeFrame(cx,cy,charW*nameFz,nameH);
    const centroid=[scx,scy];
    const nameY=centroid[1]-(sub?nameFz*0.40:0);

    svg.append('text').attr('class','zone-name')
      .attr('x',centroid[0]).attr('y',nameY).attr('font-size',nameFz)
      .attr('fill',acc)
      .attr('stroke','rgba(245,235,210,0.88)')
      .attr('stroke-width',Math.max(3.5,nameFz*0.10))
      .attr('stroke-linejoin','round')
      .attr('letter-spacing',clamp(0.04,nameFz*0.005,0.18)+'em')
      .attr('opacity',0.94)
      .text(main);

    if(sub){
      svg.append('text').attr('class','zone-sub')
        .attr('x',centroid[0]).attr('y',nameY+nameFz*0.82)
        .attr('font-size',clamp(8,nameFz*0.38,17))
        .attr('fill',acc).attr('opacity',0.65)
        .attr('stroke','rgba(255,255,255,0.50)').attr('stroke-width','2px')
        .text(sub);
    }

    R.push({x:centroid[0],y:centroid[1],w:charW*nameFz,h:nameFz*(sub?1.6:1.2)});
    placeItems(svg,zone,poly,centroid,nameFz,acc,R);

    svg.append('path').attr('class','zone-hotspot')
      .attr('d','M'+poly.map(p=>p.join(',')).join('L')+'Z')
      .on('click',()=>selectZone(zone));
  });

  // (labels always visible — no tier hiding)
}

function placeItems(svg,zone,poly,centroid,nameFz,acc,R){
  const items=(zone.labels||[]).slice().sort((a,b)=>b.weight-a.weight);
  const rngR=mulberry32(0x1234^(zone.id.charCodeAt(0)*137));
  const pxs=poly.map(p=>p[0]),pys=poly.map(p=>p[1]);
  const bx0=Math.min(...pxs),bx1=Math.max(...pxs);
  const by0=Math.min(...pys),by1=Math.max(...pys);
  let angle=1.1,radius=nameFz*0.80;

  const budget=OVERVIEW_BUDGET[zone.id]??7;
  let overviewCount=0;
  items.forEach(item=>{
    // Base tier from weight
    let tier=item.weight>=0.60?1:item.weight>=0.25?2:3;
    // Demote (not skip) beyond per-zone overview budget — zoom-reveal preserved
    if(tier===1){ overviewCount++; if(overviewCount>budget) tier=2; }
    const cls=tier===1?'lbl-t1':tier===2?'lbl-t2':'lbl-t3';
    let fz,ff,fs,op;
    if(tier===1){
      fz=clamp(10,nameFz*0.34,18);ff='Cinzel, serif';fs='normal';op=1.0;
    } else if(tier===2){
      fz=clamp(7,nameFz*0.23,13);ff='Crimson Text, serif';fs='italic';op=0.84;
    } else {
      fz=clamp(5,nameFz*0.15,9);ff='Crimson Text, serif';fs='italic';op=0.66;
    }
    const tw=Math.min(item.text.length*fz*0.40,220),th=fz*1.28;
    let px=0,py=0,found=false;

    // Use a polygon shrunk 30% toward centroid for placement — keeps labels
    // away from zone edges where atlas image may show ocean channels
    const innerPoly = poly.map(([x,y])=>[
      centroid[0]+(x-centroid[0])*0.70,
      centroid[1]+(y-centroid[1])*0.70,
    ]);
    const ok=(tx,ty)=>
      d3.polygonContains(innerPoly,[tx,ty]) &&
      !R.some(r=>Math.abs(tx-r.x)<(tw/2+r.w/2+1.2)&&Math.abs(ty-r.y)<(th/2+r.h/2+0.8));

    for(let a=0;a<320&&!found;a++){
      const tx=centroid[0]+Math.cos(angle)*radius,ty=centroid[1]+Math.sin(angle)*radius*0.75;
      if(ok(tx,ty)){px=tx;py=ty;found=true;}
      angle+=0.38;if(a%5===4)radius+=fz*0.60;
    }
    if(!found){
      // Grid scan within inner polygon bounds
      const ixs=innerPoly.map(p=>p[0]), iys=innerPoly.map(p=>p[1]);
      const ix0=Math.min(...ixs),ix1=Math.max(...ixs);
      const iy0=Math.min(...iys),iy1=Math.max(...iys);
      outer:for(let gy=iy0+th*0.6;gy<iy1-th*0.6;gy+=th*0.80)
        for(let gx=ix0+tw*0.5;gx<ix1-tw*0.5;gx+=tw*0.68)
          if(ok(gx,gy)){px=gx;py=gy;found=true;break outer;}
    }
    if(!found) return;

    R.push({x:px,y:py,w:tw,h:th});
    const rot=(rngR()-0.5)*22;

    // City/capital dot marker for tier-1 items
    if(cls==='lbl-t1'){
      svg.append('circle')
        .attr('class',`city-marker ${cls}`)
        .attr('cx',px).attr('cy',py-th/2-4).attr('r',2.5)
        .attr('fill',acc).attr('opacity',0.85).attr('pointer-events','none');
      R.push({x:px,y:py-th/2-4,w:8,h:8});
    }

    svg.append('text').attr('class',`zone-item ${cls}`)
      .attr('transform',`translate(${px},${py}) rotate(${rot})`)
      .attr('x',0).attr('y',0).attr('text-anchor','middle')
      .attr('font-size',fz).attr('font-family',ff).attr('font-style',fs)
      .attr('fill',acc)
      .attr('stroke','rgba(240,228,196,0.78)')
      .attr('stroke-width',Math.max(1.5,fz*0.12))
      .attr('stroke-linejoin','round')
      .attr('opacity',op)
      .text(item.text.length>30?item.text.slice(0,29)+'…':item.text)
      .on('click',()=>selectZone(zone));
  });
}

// ── Overlay (static — never zooms) ─────────────────────────────────────────
function renderOverlay(){
  const ov=d3.select('#map-overlay').attr('width',W).attr('height',H);
  ov.selectAll('*').remove();

  // Double border frame
  ov.append('rect').attr('x',2).attr('y',2).attr('width',W-4).attr('height',H-4)
    .attr('fill','none').attr('stroke','rgba(80,60,20,0.55)').attr('stroke-width',2.0);
  ov.append('rect').attr('x',7).attr('y',7).attr('width',W-14).attr('height',H-14)
    .attr('fill','none').attr('stroke','rgba(80,60,20,0.22)').attr('stroke-width',0.8)
    .attr('stroke-dasharray','5,4');

  // Corner medallions
  [[14,14],[W-14,14],[14,H-14],[W-14,H-14]].forEach(([cx,cy])=>{
    ov.append('circle').attr('cx',cx).attr('cy',cy).attr('r',10)
      .attr('fill','rgba(210,200,175,0.88)').attr('stroke','rgba(80,60,20,0.55)').attr('stroke-width',1);
    ov.append('circle').attr('cx',cx).attr('cy',cy).attr('r',3).attr('fill','rgba(80,60,20,0.6)');
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dx,dy])=>
      ov.append('line').attr('x1',cx+dx*4).attr('y1',cy+dy*4).attr('x2',cx+dx*11).attr('y2',cy+dy*11)
        .attr('stroke','rgba(80,60,20,0.50)').attr('stroke-width',1));
  });

  // Lat/lon ticks
  for(let i=1;i<7;i++){
    const y=H*i/7,deg=Math.round(60-i*20);
    [[2,12,'start'],[W-2,W-12,'end']].forEach(([x1,x2,anc])=>{
      ov.append('line').attr('x1',x1).attr('y1',y).attr('x2',x2).attr('y2',y)
        .attr('stroke','rgba(80,60,20,0.38)').attr('stroke-width',0.8);
      ov.append('text').attr('x',anc==='start'?x2+3:x2-3).attr('y',y)
        .attr('text-anchor',anc).attr('dominant-baseline','middle')
        .attr('font-size',6.5).attr('font-family','Crimson Text, serif')
        .attr('fill','rgba(80,60,20,0.65)').text(deg+'°');
    });
  }

  // Ranking panels
  const mI=[],fI=[];
  zonesData.forEach(z=>{const es=z.engagement.total;(z.labels||[]).forEach(l=>{
    if(l.type==='music')mI.push({text:l.text,sc:l.weight*es});
    else if(l.type==='film')fI.push({text:l.text,sc:l.weight*es});
  });});
  mI.sort((a,b)=>b.sc-a.sc);fI.sort((a,b)=>b.sc-a.sc);
  const tM=[...new Map(mI.map(i=>[i.text,i])).values()].slice(0,9);
  const tF=[...new Map(fI.map(i=>[i.text,i])).values()].slice(0,9);

  [[16,24,155,116,'MOST LISTENED · ARTISTS',tM,'rgba(80,40,0,0.88)'],
   [W-171,24,155,116,'MOST WATCHED · FILMS',tF,'rgba(0,20,70,0.88)']].forEach(([x,y,w,h,title,items,col])=>{
    ov.append('rect').attr('x',x).attr('y',y).attr('width',w).attr('height',h)
      .attr('fill','rgba(215,205,182,0.94)').attr('stroke','rgba(80,60,20,0.50)').attr('stroke-width',0.9);
    ov.append('text').attr('x',x+w/2).attr('y',y+10).attr('text-anchor','middle')
      .attr('font-family','Cinzel, serif').attr('font-size',7.5).attr('font-weight',600)
      .attr('fill','rgba(30,18,8,0.88)').attr('letter-spacing','0.05em').text(title);
    ov.append('line').attr('x1',x+4).attr('y1',y+15).attr('x2',x+w-4).attr('y2',y+15)
      .attr('stroke','rgba(80,60,20,0.35)').attr('stroke-width',0.6);
    items.forEach((item,i)=>
      ov.append('text').attr('x',x+8).attr('y',y+22+i*9.8)
        .attr('dominant-baseline','middle').attr('font-size',6.8)
        .attr('font-family','Crimson Text, serif').attr('fill',col)
        .text(`${i+1}. ${item.text.length>20?item.text.slice(0,19)+'…':item.text}`));
  });

  // ── Title cartouche — poster anchor ──────────────────────────────────────
  const ccx=W*0.5, ccy=H-22, cW=460, cH=60;
  // Outer parchment box with double border
  ov.append('rect').attr('x',ccx-cW/2).attr('y',ccy-cH/2).attr('width',cW).attr('height',cH)
    .attr('fill','rgba(218,208,182,0.96)').attr('stroke','rgba(80,60,20,0.55)').attr('stroke-width',1.4);
  ov.append('rect').attr('x',ccx-cW/2+4).attr('y',ccy-cH/2+4).attr('width',cW-8).attr('height',cH-8)
    .attr('fill','none').attr('stroke','rgba(80,60,20,0.28)').attr('stroke-width',0.6);
  // Side ornamental dashes
  [[-1,0],[1,0]].forEach(([dx])=>{
    const sx=ccx+dx*(cW/2-20), sy=ccy;
    ov.append('line').attr('x1',sx-6).attr('y1',sy).attr('x2',sx+6).attr('y2',sy)
      .attr('stroke','rgba(80,60,20,0.50)').attr('stroke-width',0.8);
    ov.append('circle').attr('cx',sx).attr('cy',sy).attr('r',2).attr('fill','rgba(80,60,20,0.55)');
  });
  // Corner dots
  [[ccx-cW/2,ccy-cH/2],[ccx+cW/2,ccy-cH/2],[ccx-cW/2,ccy+cH/2],[ccx+cW/2,ccy+cH/2]].forEach(([x,y])=>
    ov.append('circle').attr('cx',x).attr('cy',y).attr('r',3).attr('fill','rgba(80,60,20,0.55)'));
  // Title
  ov.append('text').attr('x',ccx).attr('y',ccy-10).attr('text-anchor','middle')
    .attr('font-family','Cinzel, serif').attr('font-size',15).attr('font-weight',700)
    .attr('fill','rgba(30,18,8,0.94)').attr('letter-spacing','0.10em')
    .text('YOUR TASTE MAP');
  ov.append('text').attr('x',ccx).attr('y',ccy+8).attr('text-anchor','middle')
    .attr('font-family','Crimson Text, serif').attr('font-style','italic').attr('font-size',9.5)
    .attr('fill','rgba(30,18,8,0.62)')
    .text('A personal atlas of music, film, books and worlds');

  // Compass rose
  const[crx,cry,crr]=[W-52,H-52,24];
  const cr=ov.append('g').attr('pointer-events','none').attr('opacity',0.90);
  cr.append('circle').attr('cx',crx).attr('cy',cry).attr('r',crr+5)
    .attr('fill','rgba(215,205,182,0.92)').attr('stroke','rgba(80,60,20,0.50)').attr('stroke-width',0.9);
  const gold='#906020',dk='#604010',cream='#e8dab8';
  [0,45,90,135,180,225,270,315].forEach((deg,i)=>{
    const rad=(deg-90)*Math.PI/180,tip=crr*(i%2===0?1.0:0.55),side=crr*0.14;
    const tx=crx+Math.cos(rad)*tip,ty=cry+Math.sin(rad)*tip;
    const lx=Math.cos(rad-Math.PI/2)*side,ly=Math.sin(rad-Math.PI/2)*side;
    cr.append('polygon').attr('points',`${crx},${cry} ${crx+lx},${cry+ly} ${tx},${ty}`)
      .attr('fill',i%2===0?cream:gold).attr('opacity',0.92);
    cr.append('polygon').attr('points',`${crx},${cry} ${tx},${ty} ${crx-lx},${cry-ly}`).attr('fill',dk);
  });
  cr.append('circle').attr('cx',crx).attr('cy',cry).attr('r',3).attr('fill',gold);
  [['N',0,-1],['S',0,1],['E',1,0],['W',-1,0]].forEach(([l,dx,dy])=>
    cr.append('text').attr('x',crx+dx*(crr+11)).attr('y',cry+dy*(crr+11))
      .attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('font-family','Cinzel, serif').attr('font-size',7).attr('font-weight',600)
      .attr('fill',gold).text(l));
}

// ── Interaction ────────────────────────────────────────────────────────────
function selectZone(zone){
  d3.selectAll('.zone-selected-ring').remove();
  const poly=zonePolygons[zone.id];
  if(poly){
    d3.select('#map-svg').append('path').attr('class','zone-selected-ring').attr('pointer-events','none')
      .attr('d','M'+poly.map(p=>p.join(',')).join('L')+'Z')
      .attr('fill','none').attr('stroke',ZONE_ACCENT[zone.id]||'#333')
      .attr('stroke-width',2.5).attr('opacity',0.8);
    const c=d3.polygonCentroid(poly);
    const xs=poly.map(p=>p[0]),ys=poly.map(p=>p[1]);
    const bw=d3.max(xs)-d3.min(xs),bh=d3.max(ys)-d3.min(ys);
    const s=Math.min(W/bw*0.52,H/bh*0.52,7);
    d3.select('#map-outer').transition().duration(700).ease(d3.easeCubicInOut)
      .call(zoomBehavior.transform,d3.zoomIdentity.translate(W/2-c[0]*s,H/2-c[1]*s).scale(s));
  }
}
function resetZoom(){
  d3.selectAll('.zone-selected-ring').remove();
  d3.select('#map-outer').transition().duration(600).ease(d3.easeCubicInOut)
    .call(zoomBehavior.transform,d3.zoomIdentity);
}

// ── Bootstrap ──────────────────────────────────────────────────────────────
function renderBrain(zones){
  zonesData=zones;
  maxEngagement=d3.max(zones,d=>d.engagement.total)||1;

  // Size everything to W×H
  const img=document.getElementById('atlas-img');
  img.style.width=W+'px'; img.style.height=H+'px';
  d3.select('#map-svg').attr('width',W).attr('height',H);
  d3.select('#map-overlay').attr('width',W).attr('height',H);
  d3.select('#map-wrap').style('width',W+'px').style('height',H+'px');
  d3.select('#map-outer').style('width',W+'px').style('height',H+'px');

  buildVoronoi(zones);
  buildAtlasLandMask();  // pixel mask from atlas image — constrains labels to land

  zoomBehavior=d3.zoom().scaleExtent([0.5,22])
    .on('zoom',({transform})=>{
      d3.select('#map-wrap').style('transform',`translate(${transform.x}px,${transform.y}px) scale(${transform.k})`);
      currentZoom=transform.k;
      updateLabelTiers(transform.k);
      updateBasemapLOD(transform.k);  // muted overview → rich illustration on zoom
    });
  d3.select('#map-outer').call(zoomBehavior);

  document.fonts.ready.then(()=>{
    renderOverlay();         // panels FIRST so their areas are pre-reserved in R[]
    renderLabels(zones);     // labels SECOND — no overlap with panels
    updateLabelTiers(1);
    updateBasemapLOD(1);    // apply initial muted state
  });
}

async function init(){
  document.getElementById('loading-overlay').classList.add('visible');
  try{
    let zones;
    if(window.BRAIN_ZONES) zones=window.BRAIN_ZONES;
    else {
      const r=await fetch('/api/brain/zones');
      if(!r.ok) throw new Error(r.status);
      zones=await r.json();
    }
    // Wait for atlas image to load before sizing
    const img=document.getElementById('atlas-img');
    if(!img.complete){
      await new Promise(res=>{ img.onload=res; img.onerror=res; });
    }
    renderBrain(zones);
  } catch(e){
    document.getElementById('loading-overlay').querySelector('span').textContent='Failed to load — server running?';
    return;
  }
  document.getElementById('loading-overlay').classList.remove('visible');
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') resetZoom(); });
init();
</script>
